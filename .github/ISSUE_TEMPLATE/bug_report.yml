name: Informe de error
description: Algo no funciona como debería en LEFA
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Gracias por reportar un error. Cuanta más información des, más fácil será reproducirlo.
        No incluyas datos fiscales reales (NIF de clientes, importes, PDFs de facturas).

  - type: dropdown
    id: area
    attributes:
      label: Área afectada
      options:
        - Inicio (resumen / navegación)
        - Nueva Factura (borrador, emisión, líneas)
        - Listado de facturas (duplicar, rectificar, cobro)
        - Presupuestos
        - Clientes
        - PDF / logo / QR en factura
        - Facturae (XML)
        - VeriFactu (hash, registro, exportación)
        - Envío por correo (SMTP)
        - Preferencias / numeración / series
        - Copia de seguridad (ZIP)
        - Bandeja del sistema
        - Arranque (run_app.py / main.py)
        - Otro
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Versión o commit
      description: Versión de LEFA o hash de commit si ejecutas desde código fuente
      placeholder: "1.0.0 o main @ abc1234"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducir
      description: Lista numerada de acciones hasta ver el fallo
      placeholder: |
        1. Abrir pestaña Nueva Factura
        2. Seleccionar cliente de ejemplo
        3. Añadir una línea y pulsar Emitir
        4. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportamiento esperado
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportamiento actual
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs o capturas
      description: Salida de terminal, traceback o capturas (sin datos personales)
      render: shell

  - type: dropdown
    id: environment
    attributes:
      label: Entorno
      options:
        - Linux
        - Windows
        - No lo sé
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Versión de Python (si aplica)
      placeholder: "3.12.x"

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmación
      options:
        - label: He buscado en issues abiertas y cerradas y no he encontrado un duplicado
          required: true
